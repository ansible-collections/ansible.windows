---
- name: ensure test dir is present
  ansible.windows.win_file:
    path: '{{ test_credential_dir }}'
    state: directory

- name: ensure test credentials are removed before testing
  win_credential:
    name: '{{ test_hostname }}'
    type: '{{ item }}'
    state: absent
  vars: &become_vars
    ansible_become: True
    ansible_become_method: runas
    ansible_become_user: '{{ ansible_user }}'
    ansible_become_pass: '{{ ansible_password | default(ansible_test_connection_password) }}'
  with_items:
  - domain_password
  - domain_certificate
  - generic_password
  - generic_certificate

- block:
  - name: run tests
    include_tasks: tests.yml

  always:
  - name: remove test credentials
    win_credential:
      name: '{{ test_hostname }}'
      type: '{{ item }}'
      state: absent
    vars: *become_vars
    with_items:
    - domain_password
    - domain_certificate
    - generic_password
    - generic_certificate

  - name: remove test dir
    ansible.windows.win_file:
      path: '{{ test_credential_dir }}'
      state: absent
