---
- name: Remove DHCP Address by IP
  win_dhcp_lease:
    state: absent
    ip: "{{ dhcp_lease_ip }}"
  check_mode: true
  register: remove_reservation
  failed_when: remove_reservation.changed != false

- name: Create Lease
  win_dhcp_lease:
    type: lease
    ip: "{{ dhcp_lease_ip }}"
    scope_id: "{{ dhcp_scope_id }}"
    mac: "{{ dhcp_lease_mac }}"
    dns_hostname: "{{ dhcp_lease_hostname }}"
    dns_regtype: noreg
    description: This is a description!
  check_mode: true
  register: create_lease
  failed_when: create_lease.changed == false

- name: Create Reservation
  win_dhcp_lease:
    type: reservation
    ip: "{{ dhcp_lease_ip }}"
    mac: "{{ dhcp_lease_mac }}"
    scope_id: "{{ dhcp_scope_id }}"
  check_mode: true
  register: create_reservation
  failed_when: create_reservation.changed == false

- name: Create Reservation w/Description
  win_dhcp_lease:
    type: reservation
    ip: "{{ dhcp_lease_ip }}"
    mac: "{{ dhcp_lease_mac }}"
    scope_id: "{{ dhcp_scope_id }}"
    description: This is a Description!
  check_mode: true
  register: create_reservation_with_description
  failed_when: create_reservation_with_description.changed == false

- name: Remove DHCP Reservation by MAC
  win_dhcp_lease:
    state: absent
    mac: "{{ dhcp_lease_mac }}"
  check_mode: true
  register: remove_reservation_by_mac
  failed_when: remove_reservation_by_mac.changed != false
