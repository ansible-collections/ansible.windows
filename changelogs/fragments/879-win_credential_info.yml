minor_changes:
- win_credential_info - new module to retrieve information about credentials stored
  in the Windows Credential Manager, including credentials stored under service
  accounts like SYSTEM that are not visible in the Credential Manager UI
  (https://github.com/ansible-collections/ansible.windows/issues/879).
- win_credential - added documentation note clarifying that credentials are stored
  per-user and that credentials created under the SYSTEM account will not appear in
  the Credential Manager UI
  (https://github.com/ansible-collections/ansible.windows/issues/879).
